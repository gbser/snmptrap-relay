server:
  host: 0.0.0.0
  port: 162
  max_datagram_size: 8192
  cleanup_interval_seconds: 30

logging:
  level: INFO
  format: text
  file: /var/log/snmptrap-relay/snmptrap-relay.log
  # Optional separate file that will contain only forwarded alerts.
  alerts_file: /var/log/snmptrap-relay/alerts.log

receiver:
  v3_users:
    - user_name: trapuser
      authentication_protocol: sha256
      authentication_passphrase: change-me-auth
      privacy_protocol: aes256
      privacy_passphrase: change-me-priv

# Map SNMP OIDs to human-friendly names used in rule keys and matching.
field_aliases:
  "1.3.6.1.2.1.2.2.1.1": ifIndex
  "1.3.6.1.4.1.9999.1.1": device_id
  "1.3.6.1.4.1.9999.1.2": circuit_id

forwarders:
  - name: telegraf
    host: 127.0.0.1
    port: 9162
    enabled: true
  - name: external
    host: 10.10.10.20
    port: 162
    enabled: false

filters:
  # keep = allow the trap to continue to dedup/forwarding
  # drop = ignore the trap
  default_action: keep
  rules:
    - id: drop_test_traps
      action: drop
      match:
        trap_oid: "1.3.6.1.4.1.9999.0.1"

dedup_defaults:
  ttl_seconds: 300
  key_fields:
    - trap_oid
    - fields.ifIndex
    - fields.device_id

alarms:
  - id: link_down
    match:
      trap_oid: "1.3.6.1.4.1.9999.0.10"
    dedup:
      ttl_seconds: 300
      key_fields:
        - trap_oid
        - fields.ifIndex
        - fields.device_id
      hold_until_clear: true
      # Clear trap for this alarm.
      clear:
        match:
          trap_oid: "1.3.6.1.4.1.9999.0.11"
        key_fields:
          - trap_oid
          - fields.ifIndex
          - fields.device_id
        # Example regex-based clear: check a varbind value for the string "clear"
        # If you need the clear to be conditional on a varbind value, you can
        # specify `varbind_oid` and `regex` here. The regex is applied to the
        # varbind value (string) and must match for the trap to be considered
        # a clear. Example (uncomment to enable):
        #varbind_oid: "1.3.6.1.4.1.9999.1.3"
        #regex: "(?i)clear"

      # Alternative pattern: alert and clear use the SAME trap OID.
      # In that case keep the clear.match trap_oid identical to the alarm
      # match and make the clear conditional on a varbind value using the
      # `varbind_oid` + `regex` fields. This way a trap with the same OID can
      # be differentiated as an alert or as a clear depending on the varbind.
      # Example (uncomment the block below to enable):
      #clear:
      #  match:
      #    trap_oid: "1.3.6.1.4.1.9999.0.10"    # same as alarm match above
      #  key_fields:
      #    - trap_oid
      #    - fields.ifIndex
      #    - fields.device_id
      #  varbind_oid: "1.3.6.1.4.1.9999.1.3"
      #  regex: "(?i)clear"
